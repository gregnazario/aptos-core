<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Move Decompiler WASM - Enhanced with On-Chain Lookup</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .status {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 15px 20px;
            margin-bottom: 20px;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status.loading {
            background: rgba(255, 193, 7, 0.3);
        }

        .status.ready {
            background: rgba(76, 175, 80, 0.3);
        }

        .status.error {
            background: rgba(244, 67, 54, 0.3);
        }

        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            margin-bottom: 20px;
        }

        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .card-body {
            padding: 25px;
        }

        .input-modes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .mode-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1;
            padding: 12px 24px;
            border: 2px solid #667eea;
            background: white;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: #667eea;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .mode-btn:hover:not(.active) {
            background: #f0f0f0;
        }

        .input-section {
            display: none;
        }

        .input-section.active {
            display: block;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 60px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .drop-zone:hover, .drop-zone.drag-over {
            border-color: #764ba2;
            background: #e9ecef;
            transform: scale(1.02);
        }

        .drop-zone-icon {
            font-size: 4rem;
            margin-bottom: 15px;
        }

        .drop-zone-text {
            font-size: 1.2rem;
            color: #495057;
            margin-bottom: 10px;
        }

        .drop-zone-hint {
            font-size: 0.9rem;
            color: #6c757d;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #495057;
        }

        .form-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 1rem;
            background: white;
            cursor: pointer;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            min-width: 150px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #5a6268;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .well-known-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .well-known-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .well-known-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .well-known-name {
            font-weight: 600;
            color: #212529;
            margin-bottom: 5px;
        }

        .well-known-address {
            font-size: 0.85rem;
            color: #6c757d;
            font-family: monospace;
            word-break: break-all;
        }

        .module-list {
            margin-top: 20px;
            max-height: 400px;
            overflow-y: auto;
        }

        .module-item {
            padding: 12px;
            background: #f8f9fa;
            border-radius: 6px;
            margin-bottom: 8px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .module-item:hover {
            background: #e9ecef;
            transform: translateX(5px);
        }

        .module-name {
            font-weight: 600;
            color: #212529;
        }

        .module-stats {
            font-size: 0.85rem;
            color: #6c757d;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #e9ecef;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            border-bottom: 3px solid transparent;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s ease;
        }

        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }

        .tab:hover:not(.active) {
            color: #495057;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .metadata-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .metadata-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .metadata-label {
            font-size: 0.85rem;
            color: #6c757d;
            margin-bottom: 5px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .metadata-value {
            font-size: 1.2rem;
            color: #212529;
            font-weight: 600;
        }

        .code-block {
            background: #282c34;
            color: #abb2bf;
            padding: 20px;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            max-height: 600px;
            overflow-y: auto;
        }

        .code-block pre {
            margin: 0;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #f5c6cb;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .network-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            background: #667eea;
            color: white;
            margin-left: 10px;
        }

        .file-input {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 Move Decompiler WASM</h1>
            <p>Decompile and analyze Move bytecode - Upload files or fetch from chain</p>
        </div>

        <div id="status" class="status loading">
            <div class="loading-spinner"></div>
            <span id="status-text">Loading WASM module...</span>
        </div>

        <div class="card">
            <div class="card-header">
                📁 Load Bytecode
            </div>
            <div class="card-body">
                <div class="mode-selector">
                    <button class="mode-btn active" data-mode="file">📂 Upload File</button>
                    <button class="mode-btn" data-mode="onchain">🌐 Fetch On-Chain</button>
                </div>

                <!-- File Upload Mode -->
                <div id="file-mode" class="input-section active">
                    <div class="drop-zone" id="dropZone">
                        <div class="drop-zone-icon">📦</div>
                        <div class="drop-zone-text">Drag & drop your .mv file here</div>
                        <div class="drop-zone-hint">or click to browse</div>
                    </div>
                    <input type="file" id="fileInput" class="file-input" accept=".mv,.blob">

                    <div class="button-group">
                        <button class="btn btn-primary" id="browseBtn">
                            📂 Browse Files
                        </button>
                    </div>
                </div>

                <!-- On-Chain Lookup Mode -->
                <div id="onchain-mode" class="input-section">
                    <div class="form-group">
                        <label class="form-label">Network</label>
                        <select class="form-select" id="networkSelect">
                            <option value="mainnet">Mainnet</option>
                            <option value="testnet">Testnet</option>
                            <option value="devnet">Devnet</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Account Address</label>
                        <input
                            type="text"
                            class="form-input"
                            id="addressInput"
                            placeholder="0x1 or full address"
                            value="0x1"
                        >
                    </div>

                    <div class="button-group">
                        <button class="btn btn-primary" id="fetchModulesBtn">
                            🔍 Fetch Modules
                        </button>
                        <button class="btn btn-secondary" id="showWellKnownBtn">
                            ⭐ Well-Known Addresses
                        </button>
                    </div>

                    <div id="moduleList" class="module-list" style="display: none;"></div>
                    <div id="wellKnownList" class="well-known-list" style="display: none;"></div>
                </div>

                <div id="fileInfo" style="margin-top: 20px; display: none;">
                    <strong>Loaded:</strong> <span id="fileName"></span>
                    (<span id="fileSize"></span> bytes)
                    <span id="networkBadge" class="network-badge" style="display: none;"></span>
                </div>
            </div>
        </div>

        <div class="card" id="outputCard" style="display: none;">
            <div class="card-header">
                📊 Analysis Results
            </div>
            <div class="card-body">
                <div class="tabs">
                    <button class="tab active" data-tab="metadata">Metadata</button>
                    <button class="tab" data-tab="decompiled">Decompiled Source</button>
                    <button class="tab" data-tab="disassembly">Disassembly</button>
                </div>

                <div id="metadata" class="tab-content active">
                    <div class="metadata-grid" id="metadataGrid"></div>
                    <div id="metadataJson" class="code-block"></div>
                </div>

                <div id="decompiled" class="tab-content">
                    <div class="code-block" id="decompiledCode"></div>
                </div>

                <div id="disassembly" class="tab-content">
                    <div class="code-block" id="disassemblyCode"></div>
                </div>

                <div class="button-group" style="margin-top: 20px;">
                    <button class="btn btn-secondary" id="copyBtn">
                        📋 Copy to Clipboard
                    </button>
                    <button class="btn btn-secondary" id="downloadBtn">
                        💾 Download Results
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import init, {
            decompile_module,
            disassemble_module,
            get_module_metadata,
            verify_module,
            get_version_info
        } from '../pkg/move_decompiler_wasm.js';

        // Configuration
        const API_BASE = window.location.origin;

        let wasmLoaded = false;
        let currentBytecode = null;
        let currentResults = {};
        let currentNetwork = null;

        // DOM elements
        const status = document.getElementById('status');
        const statusText = document.getElementById('status-text');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const browseBtn = document.getElementById('browseBtn');
        const networkSelect = document.getElementById('networkSelect');
        const addressInput = document.getElementById('addressInput');
        const fetchModulesBtn = document.getElementById('fetchModulesBtn');
        const showWellKnownBtn = document.getElementById('showWellKnownBtn');
        const moduleList = document.getElementById('moduleList');
        const wellKnownList = document.getElementById('wellKnownList');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const networkBadge = document.getElementById('networkBadge');

        // Status management
        function setStatus(state, message) {
            status.className = `status ${state}`;
            statusText.textContent = message;
        }

        // Initialize WASM
        async function initWasm() {
            try {
                await init();
                const info = get_version_info();
                console.log('WASM loaded:', info);
                setStatus('ready', '✅ WASM module ready');
                wasmLoaded = true;
            } catch (err) {
                console.error('Failed to load WASM:', err);
                setStatus('error', '❌ Failed to load WASM module: ' + err.message);
            }
        }

        // Mode switching
        document.querySelectorAll('.mode-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const mode = btn.dataset.mode;

                document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                document.querySelectorAll('.input-section').forEach(s => s.classList.remove('active'));
                document.getElementById(`${mode}-mode`).classList.add('active');
            });
        });

        // File upload handling
        dropZone.addEventListener('click', () => fileInput.click());
        browseBtn.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('drag-over');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('drag-over');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        async function handleFile(file) {
            if (!wasmLoaded) {
                alert('WASM module not loaded yet. Please wait...');
                return;
            }

            try {
                fileName.textContent = file.name;
                fileSize.textContent = file.size.toLocaleString();
                fileInfo.style.display = 'block';
                networkBadge.style.display = 'none';

                const arrayBuffer = await file.arrayBuffer();
                currentBytecode = new Uint8Array(arrayBuffer);
                currentNetwork = null;

                await analyzeBytecode();
            } catch (err) {
                console.error('Error reading file:', err);
                alert('Error reading file: ' + err.message);
            }
        }

        // On-chain module fetching
        fetchModulesBtn.addEventListener('click', async () => {
            const network = networkSelect.value;
            const address = addressInput.value.trim();

            if (!address) {
                alert('Please enter an address');
                return;
            }

            setStatus('loading', '🔄 Fetching modules from chain...');

            try {
                const response = await fetch(`${API_BASE}/api/modules/${network}/${address}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }

                const data = await response.json();
                displayModuleList(data.modules, network, address);

                setStatus('ready', `✅ Found ${data.modules.length} modules`);
            } catch (err) {
                console.error('Error fetching modules:', err);
                setStatus('error', '❌ Failed to fetch modules');
                alert('Error: ' + err.message);
            }
        });

        function displayModuleList(modules, network, address) {
            moduleList.innerHTML = '';
            wellKnownList.style.display = 'none';

            modules.forEach(module => {
                const item = document.createElement('div');
                item.className = 'module-item';

                const functionCount = module.abi?.exposed_functions?.length || 0;
                const structCount = module.abi?.structs?.length || 0;

                item.innerHTML = `
                    <div class="module-name">${module.name}</div>
                    <div class="module-stats">
                        ${functionCount} functions, ${structCount} structs
                    </div>
                `;

                item.addEventListener('click', () => {
                    fetchSpecificModule(network, address, module.name);
                });

                moduleList.appendChild(item);
            });

            moduleList.style.display = 'block';
        }

        async function fetchSpecificModule(network, address, moduleName) {
            setStatus('loading', `🔄 Fetching module ${moduleName}...`);

            try {
                const response = await fetch(`${API_BASE}/api/module/${network}/${address}/${moduleName}`);

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${await response.text()}`);
                }

                const data = await response.json();

                fileName.textContent = `${moduleName} (on-chain)`;
                fileSize.textContent = data.bytecodeSize.toLocaleString();
                networkBadge.textContent = network.toUpperCase();
                networkBadge.style.display = 'inline-block';
                fileInfo.style.display = 'block';

                currentBytecode = new Uint8Array(data.bytecode);
                currentNetwork = network;

                await analyzeBytecode();
                setStatus('ready', '✅ Analysis complete');
            } catch (err) {
                console.error('Error fetching module:', err);
                setStatus('error', '❌ Failed to fetch module');
                alert('Error: ' + err.message);
            }
        }

        // Well-known addresses
        showWellKnownBtn.addEventListener('click', async () => {
            try {
                const response = await fetch(`${API_BASE}/api/well-known`);
                const addresses = await response.json();

                wellKnownList.innerHTML = '';
                moduleList.style.display = 'none';

                addresses.forEach(addr => {
                    const item = document.createElement('div');
                    item.className = 'well-known-item';
                    item.innerHTML = `
                        <div class="well-known-name">${addr.name}</div>
                        <div class="well-known-address">${addr.address}</div>
                        <div style="font-size: 0.85rem; color: #6c757d; margin-top: 5px;">
                            ${addr.description}
                        </div>
                    `;

                    item.addEventListener('click', () => {
                        addressInput.value = addr.address;
                        wellKnownList.style.display = 'none';
                        fetchModulesBtn.click();
                    });

                    wellKnownList.appendChild(item);
                });

                wellKnownList.style.display = 'grid';
            } catch (err) {
                console.error('Error fetching well-known addresses:', err);
                alert('Error: ' + err.message);
            }
        });

        // Analysis functions
        async function analyzeBytecode() {
            try {
                setStatus('loading', '🔄 Analyzing bytecode...');

                const isValid = verify_module(currentBytecode);
                console.log('Bytecode valid:', isValid);

                const metadata = get_module_metadata(currentBytecode);
                currentResults.metadata = {
                    name: metadata.name,
                    address: metadata.address,
                    version: metadata.version,
                    functionCount: metadata.functionCount,
                    structCount: metadata.structCount,
                    dependencies: JSON.parse(metadata.getDependencies()),
                    network: currentNetwork,
                };

                const decompiled = decompile_module(currentBytecode);
                currentResults.decompiled = decompiled;

                const disassembly = disassemble_module(currentBytecode);
                currentResults.disassembly = disassembly;

                displayResults();
                setStatus('ready', '✅ Analysis complete');
            } catch (err) {
                console.error('Analysis error:', err);
                setStatus('error', '❌ Analysis failed: ' + err);

                document.getElementById('outputCard').style.display = 'block';
                document.getElementById('metadataGrid').innerHTML = `
                    <div class="error-message">
                        <strong>Error:</strong> ${err}
                    </div>
                `;
            }
        }

        function displayResults() {
            document.getElementById('outputCard').style.display = 'block';

            const metadataGrid = document.getElementById('metadataGrid');
            metadataGrid.innerHTML = `
                <div class="metadata-item">
                    <div class="metadata-label">Module Name</div>
                    <div class="metadata-value">${currentResults.metadata.name}</div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">Address</div>
                    <div class="metadata-value">${currentResults.metadata.address || 'N/A'}</div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">Version</div>
                    <div class="metadata-value">${currentResults.metadata.version}</div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">Functions</div>
                    <div class="metadata-value">${currentResults.metadata.functionCount}</div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">Structs</div>
                    <div class="metadata-value">${currentResults.metadata.structCount}</div>
                </div>
                <div class="metadata-item">
                    <div class="metadata-label">Dependencies</div>
                    <div class="metadata-value">${currentResults.metadata.dependencies.length}</div>
                </div>
            `;

            if (currentResults.metadata.network) {
                metadataGrid.innerHTML += `
                    <div class="metadata-item">
                        <div class="metadata-label">Network</div>
                        <div class="metadata-value">${currentResults.metadata.network.toUpperCase()}</div>
                    </div>
                `;
            }

            document.getElementById('metadataJson').innerHTML = `<pre>${JSON.stringify(currentResults.metadata, null, 2)}</pre>`;
            document.getElementById('decompiledCode').innerHTML = `<pre>${escapeHtml(currentResults.decompiled)}</pre>`;
            document.getElementById('disassemblyCode').innerHTML = `<pre>${escapeHtml(currentResults.disassembly)}</pre>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                const tabName = tab.dataset.tab;

                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

                tab.classList.add('active');
                document.getElementById(tabName).classList.add('active');
            });
        });

        // Copy to clipboard
        document.getElementById('copyBtn').addEventListener('click', () => {
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            let textToCopy = '';

            if (activeTab === 'metadata') {
                textToCopy = JSON.stringify(currentResults.metadata, null, 2);
            } else if (activeTab === 'decompiled') {
                textToCopy = currentResults.decompiled;
            } else if (activeTab === 'disassembly') {
                textToCopy = currentResults.disassembly;
            }

            navigator.clipboard.writeText(textToCopy).then(() => {
                alert('Copied to clipboard!');
            }).catch(err => {
                alert('Failed to copy: ' + err);
            });
        });

        // Download results
        document.getElementById('downloadBtn').addEventListener('click', () => {
            const activeTab = document.querySelector('.tab.active').dataset.tab;
            let content = '';
            let filename = '';

            if (activeTab === 'metadata') {
                content = JSON.stringify(currentResults.metadata, null, 2);
                filename = 'metadata.json';
            } else if (activeTab === 'decompiled') {
                content = currentResults.decompiled;
                filename = 'decompiled.move';
            } else if (activeTab === 'disassembly') {
                content = currentResults.disassembly;
                filename = 'disassembly.txt';
            }

            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        });

        // Initialize
        initWasm();
    </script>
</body>
</html>
