<body>
    <div class="container">
        <header>
            <h1>⚡ Move Compiler Performance Benchmarks</h1>
            <p class="subtitle">Measure compilation speed and resource usage</p>
        </header>

        <div class="controls">
            <button id="runBench" onclick="runBenchmarks()">Run Benchmarks</button>
            <div class="control-group">
                <label>Iterations:</label>
                <input type="number" id="iterations" value="10" min="1" max="100">
            </div>
            <div class="control-group">
                <label>Complexity:</label>
                <select id="complexity">
                    <option value="small">Small (< 50 LOC)</option>
                    <option value="medium" selected>Medium (50-200 LOC)</option>
                    <option value="large">Large (200+ LOC)</option>
                    <option value="all">All Sizes</option>
                </select>
            </div>
            <button onclick="clearResults()">Clear Results</button>
        </div>

        <div id="results"></div>
    </div>

    <script type="module">
        import init, { compile_module, get_version_info } from '../pkg/move_compiler_wasm.js';

        let wasmInitialized = false;

        // Test modules of varying complexity
        const benchmarks = {
            small: {
                name: "Simple Counter (28 LOC)",
                code: `module 0x1::SimpleCounter {
    struct Counter has key {
        value: u64
    }

    public fun create(): Counter {
        Counter { value: 0 }
    }

    public fun increment(counter: &mut Counter) {
        counter.value = counter.value + 1;
    }

    public fun get_value(counter: &Counter): u64 {
        counter.value
    }

    public fun reset(counter: &mut Counter) {
        counter.value = 0;
    }

    public fun add(counter: &mut Counter, amount: u64) {
        counter.value = counter.value + amount;
    }
}`,
                loc: 28
            },
            medium: {
                name: "Token Standard (142 LOC)",
                code: `module 0x1::Token {
    use std::signer;
    use std::vector;

    struct Token<phantom CoinType> has key {
        value: u64
    }

    struct Balance<phantom CoinType> has key {
        coins: vector<Token<CoinType>>
    }

    struct Metadata<phantom CoinType> has key {
        name: vector<u8>,
        symbol: vector<u8>,
        decimals: u8,
        total_supply: u64
    }

    struct MintCapability<phantom CoinType> has key, store {}

    struct BurnCapability<phantom CoinType> has key, store {}

    public fun initialize<CoinType>(
        account: &signer,
        name: vector<u8>,
        symbol: vector<u8>,
        decimals: u8
    ): (MintCapability<CoinType>, BurnCapability<CoinType>) {
        let account_addr = signer::address_of(account);

        move_to(account, Metadata<CoinType> {
            name,
            symbol,
            decimals,
            total_supply: 0
        });

        move_to(account, Balance<CoinType> {
            coins: vector::empty()
        });

        (MintCapability<CoinType> {}, BurnCapability<CoinType> {})
    }

    public fun mint<CoinType>(
        _cap: &MintCapability<CoinType>,
        amount: u64
    ): Token<CoinType> {
        Token<CoinType> { value: amount }
    }

    public fun burn<CoinType>(
        token: Token<CoinType>,
        _cap: &BurnCapability<CoinType>
    ) {
        let Token { value: _ } = token;
    }

    public fun deposit<CoinType>(
        account: &signer,
        token: Token<CoinType>
    ) acquires Balance {
        let account_addr = signer::address_of(account);
        let balance = borrow_global_mut<Balance<CoinType>>(account_addr);
        vector::push_back(&mut balance.coins, token);
    }

    public fun withdraw<CoinType>(
        account: &signer,
        amount: u64
    ): Token<CoinType> acquires Balance {
        let account_addr = signer::address_of(account);
        let balance = borrow_global_mut<Balance<CoinType>>(account_addr);

        let total = value_of_balance(balance);
        assert!(total >= amount, 1);

        let withdrawn = Token<CoinType> { value: 0 };
        let remaining = amount;

        while (remaining > 0 && !vector::is_empty(&balance.coins)) {
            let coin = vector::pop_back(&mut balance.coins);
            let coin_value = coin.value;

            if (coin_value <= remaining) {
                remaining = remaining - coin_value;
                merge(&mut withdrawn, coin);
            } else {
                let to_take = remaining;
                remaining = 0;

                let split_coin = Token<CoinType> { value: to_take };
                merge(&mut withdrawn, split_coin);

                let remainder = Token<CoinType> { value: coin_value - to_take };
                vector::push_back(&mut balance.coins, remainder);

                let Token { value: _ } = coin;
            };
        };

        withdrawn
    }

    public fun transfer<CoinType>(
        from: &signer,
        to: address,
        amount: u64
    ) acquires Balance {
        let token = withdraw<CoinType>(from, amount);
        deposit_to<CoinType>(to, token);
    }

    fun deposit_to<CoinType>(
        to: address,
        token: Token<CoinType>
    ) acquires Balance {
        let balance = borrow_global_mut<Balance<CoinType>>(to);
        vector::push_back(&mut balance.coins, token);
    }

    public fun value<CoinType>(token: &Token<CoinType>): u64 {
        token.value
    }

    fun value_of_balance<CoinType>(balance: &Balance<CoinType>): u64 {
        let total = 0;
        let i = 0;
        let len = vector::length(&balance.coins);

        while (i < len) {
            let coin = vector::borrow(&balance.coins, i);
            total = total + coin.value;
            i = i + 1;
        };

        total
    }

    fun merge<CoinType>(dst: &mut Token<CoinType>, src: Token<CoinType>) {
        let Token { value } = src;
        dst.value = dst.value + value;
    }
}`,
                loc: 142
            },
            large: {
                name: "DEX Implementation (230+ LOC)",
                code: `module 0x1::SimpleDEX {
    use std::signer;
    use std::vector;

    struct LiquidityPool<phantom X, phantom Y> has key {
        reserve_x: u64,
        reserve_y: u64,
        total_liquidity: u64
    }

    struct LiquidityToken<phantom X, phantom Y> has key {
        value: u64
    }

    struct LPBalance<phantom X, phantom Y> has key {
        tokens: vector<LiquidityToken<X, Y>>
    }

    const E_INSUFFICIENT_LIQUIDITY: u64 = 1;
    const E_INSUFFICIENT_AMOUNT: u64 = 2;
    const E_SLIPPAGE_EXCEEDED: u64 = 3;
    const E_ZERO_AMOUNT: u64 = 4;
    const E_POOL_EXISTS: u64 = 5;

    public fun create_pool<X, Y>(
        account: &signer,
        initial_x: u64,
        initial_y: u64
    ) {
        assert!(initial_x > 0 && initial_y > 0, E_ZERO_AMOUNT);

        let account_addr = signer::address_of(account);
        assert!(!exists<LiquidityPool<X, Y>>(account_addr), E_POOL_EXISTS);

        let initial_liquidity = sqrt(initial_x * initial_y);

        move_to(account, LiquidityPool<X, Y> {
            reserve_x: initial_x,
            reserve_y: initial_y,
            total_liquidity: initial_liquidity
        });

        move_to(account, LPBalance<X, Y> {
            tokens: vector::singleton(LiquidityToken<X, Y> {
                value: initial_liquidity
            })
        });
    }

    public fun add_liquidity<X, Y>(
        pool_addr: address,
        provider: &signer,
        amount_x: u64,
        amount_y: u64,
        min_liquidity: u64
    ): u64 acquires LiquidityPool, LPBalance {
        assert!(amount_x > 0 && amount_y > 0, E_ZERO_AMOUNT);

        let pool = borrow_global_mut<LiquidityPool<X, Y>>(pool_addr);

        let liquidity_minted = calculate_liquidity_minted(
            amount_x,
            amount_y,
            pool.reserve_x,
            pool.reserve_y,
            pool.total_liquidity
        );

        assert!(liquidity_minted >= min_liquidity, E_SLIPPAGE_EXCEEDED);

        pool.reserve_x = pool.reserve_x + amount_x;
        pool.reserve_y = pool.reserve_y + amount_y;
        pool.total_liquidity = pool.total_liquidity + liquidity_minted;

        let provider_addr = signer::address_of(provider);
        if (!exists<LPBalance<X, Y>>(provider_addr)) {
            move_to(provider, LPBalance<X, Y> {
                tokens: vector::empty()
            });
        };

        let balance = borrow_global_mut<LPBalance<X, Y>>(provider_addr);
        vector::push_back(&mut balance.tokens, LiquidityToken<X, Y> {
            value: liquidity_minted
        });

        liquidity_minted
    }

    public fun remove_liquidity<X, Y>(
        pool_addr: address,
        provider: &signer,
        liquidity: u64,
        min_amount_x: u64,
        min_amount_y: u64
    ): (u64, u64) acquires LiquidityPool, LPBalance {
        assert!(liquidity > 0, E_ZERO_AMOUNT);

        let pool = borrow_global_mut<LiquidityPool<X, Y>>(pool_addr);

        let amount_x = (liquidity * pool.reserve_x) / pool.total_liquidity;
        let amount_y = (liquidity * pool.reserve_y) / pool.total_liquidity;

        assert!(amount_x >= min_amount_x && amount_y >= min_amount_y, E_SLIPPAGE_EXCEEDED);

        pool.reserve_x = pool.reserve_x - amount_x;
        pool.reserve_y = pool.reserve_y - amount_y;
        pool.total_liquidity = pool.total_liquidity - liquidity;

        let provider_addr = signer::address_of(provider);
        burn_liquidity_tokens<X, Y>(provider_addr, liquidity);

        (amount_x, amount_y)
    }

    public fun swap_x_to_y<X, Y>(
        pool_addr: address,
        amount_in: u64,
        min_amount_out: u64
    ): u64 acquires LiquidityPool {
        assert!(amount_in > 0, E_ZERO_AMOUNT);

        let pool = borrow_global_mut<LiquidityPool<X, Y>>(pool_addr);

        let amount_out = get_amount_out(
            amount_in,
            pool.reserve_x,
            pool.reserve_y
        );

        assert!(amount_out >= min_amount_out, E_SLIPPAGE_EXCEEDED);

        pool.reserve_x = pool.reserve_x + amount_in;
        pool.reserve_y = pool.reserve_y - amount_out;

        amount_out
    }

    public fun swap_y_to_x<X, Y>(
        pool_addr: address,
        amount_in: u64,
        min_amount_out: u64
    ): u64 acquires LiquidityPool {
        assert!(amount_in > 0, E_ZERO_AMOUNT);

        let pool = borrow_global_mut<LiquidityPool<X, Y>>(pool_addr);

        let amount_out = get_amount_out(
            amount_in,
            pool.reserve_y,
            pool.reserve_x
        );

        assert!(amount_out >= min_amount_out, E_SLIPPAGE_EXCEEDED);

        pool.reserve_y = pool.reserve_y + amount_in;
        pool.reserve_x = pool.reserve_x - amount_out;

        amount_out
    }

    public fun get_reserves<X, Y>(pool_addr: address): (u64, u64) acquires LiquidityPool {
        let pool = borrow_global<LiquidityPool<X, Y>>(pool_addr);
        (pool.reserve_x, pool.reserve_y)
    }

    fun get_amount_out(
        amount_in: u64,
        reserve_in: u64,
        reserve_out: u64
    ): u64 {
        assert!(amount_in > 0, E_ZERO_AMOUNT);
        assert!(reserve_in > 0 && reserve_out > 0, E_INSUFFICIENT_LIQUIDITY);

        let amount_in_with_fee = amount_in * 997;
        let numerator = amount_in_with_fee * reserve_out;
        let denominator = (reserve_in * 1000) + amount_in_with_fee;

        numerator / denominator
    }

    fun calculate_liquidity_minted(
        amount_x: u64,
        amount_y: u64,
        reserve_x: u64,
        reserve_y: u64,
        total_liquidity: u64
    ): u64 {
        if (total_liquidity == 0) {
            sqrt(amount_x * amount_y)
        } else {
            let liquidity_x = (amount_x * total_liquidity) / reserve_x;
            let liquidity_y = (amount_y * total_liquidity) / reserve_y;

            if (liquidity_x < liquidity_y) {
                liquidity_x
            } else {
                liquidity_y
            }
        }
    }

    fun burn_liquidity_tokens<X, Y>(
        provider_addr: address,
        amount: u64
    ) acquires LPBalance {
        let balance = borrow_global_mut<LPBalance<X, Y>>(provider_addr);
        let mut remaining = amount;

        while (remaining > 0 && !vector::is_empty(&balance.tokens)) {
            let token = vector::pop_back(&mut balance.tokens);
            if (token.value <= remaining) {
                remaining = remaining - token.value;
                let LiquidityToken { value: _ } = token;
            } else {
                let burned = remaining;
                remaining = 0;
                vector::push_back(&mut balance.tokens, LiquidityToken<X, Y> {
                    value: token.value - burned
                });
                let LiquidityToken { value: _ } = token;
            };
        };
    }

    fun sqrt(x: u64): u64 {
        if (x == 0) return 0;

        let z = (x + 1) / 2;
        let y = x;

        while (z < y) {
            y = z;
            z = (x / z + z) / 2;
        };

        y
    }
}`,
                loc: 240
            }
        };

        async function initWasm() {
            if (!wasmInitialized) {
                const runBtn = document.getElementById('runBench');
                runBtn.disabled = true;
                runBtn.innerHTML = 'Initializing WASM...<span class="spinner"></span>';

                try {
                    await init();
                    wasmInitialized = true;
                    runBtn.disabled = false;
                    runBtn.textContent = 'Run Benchmarks';

                    console.log('WASM initialized:', get_version_info());
                } catch (e) {
                    runBtn.textContent = 'WASM Init Failed';
                    console.error('Failed to initialize WASM:', e);
                    alert('Failed to initialize WASM compiler: ' + e.message);
                }
            }
        }

        async function runSingleBenchmark(benchmark, iterations) {
            const times = [];
            const bytecodeSizes = [];

            for (let i = 0; i < iterations; i++) {
                const startTime = performance.now();
                const result = compile_module(benchmark.code, "0x1", benchmark.name.replace(/\s+/g, ''));
                const endTime = performance.now();

                if (result.success) {
                    times.push(endTime - startTime);
                    bytecodeSizes.push(result.bytecode.length);
                } else {
                    console.error(`Compilation failed:`, JSON.parse(result.errors));
                    return null;
                }

                // Small delay between iterations
                await new Promise(resolve => setTimeout(resolve, 10));
            }

            // Calculate statistics
            times.sort((a, b) => a - b);
            const min = times[0];
            const max = times[times.length - 1];
            const avg = times.reduce((a, b) => a + b, 0) / times.length;
            const median = times[Math.floor(times.length / 2)];
            const avgBytecode = bytecodeSizes.reduce((a, b) => a + b, 0) / bytecodeSizes.length;

            // Calculate throughput (LOC per second)
            const throughput = (benchmark.loc / (avg / 1000)).toFixed(0);

            return {
                name: benchmark.name,
                loc: benchmark.loc,
                min,
                max,
                avg,
                median,
                avgBytecode,
                throughput,
                iterations
            };
        }

        window.runBenchmarks = async function() {
            await initWasm();

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="status">Running benchmarks...</div>';

            const iterations = parseInt(document.getElementById('iterations').value);
            const complexity = document.getElementById('complexity').value;

            // Determine which benchmarks to run
            let benchmarksToRun = [];
            if (complexity === 'all') {
                benchmarksToRun = Object.values(benchmarks);
            } else {
                benchmarksToRun = [benchmarks[complexity]];
            }

            const results = [];
            for (const benchmark of benchmarksToRun) {
                const result = await runSingleBenchmark(benchmark, iterations);
                if (result) {
                    results.push(result);
                }
            }

            displayResults(results);
        };

        function displayResults(results) {
            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '';

            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="status">No results to display</div>';
                return;
            }

            // Calculate aggregate metrics
            const totalAvg = results.reduce((sum, r) => sum + r.avg, 0) / results.length;
            const totalThroughput = results.reduce((sum, r) => sum + parseInt(r.throughput), 0) / results.length;
            const totalBytecode = results.reduce((sum, r) => sum + r.avgBytecode, 0) / results.length;

            // Display metrics
            const metricsDiv = document.createElement('div');
            metricsDiv.className = 'metrics';
            metricsDiv.innerHTML = `
                <div class="metric-card">
                    <div class="metric-value">${totalAvg.toFixed(2)}<span style="font-size:0.5em">ms</span></div>
                    <div class="metric-label">Average Time</div>
                    <div class="metric-detail">Per compilation</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">${totalThroughput.toFixed(0)}<span style="font-size:0.5em">LOC/s</span></div>
                    <div class="metric-label">Throughput</div>
                    <div class="metric-detail">Lines of code per second</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">${(totalBytecode / 1024).toFixed(1)}<span style="font-size:0.5em">KB</span></div>
                    <div class="metric-label">Avg Bytecode</div>
                    <div class="metric-detail">Output size</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value">${results[0].iterations}</div>
                    <div class="metric-label">Iterations</div>
                    <div class="metric-detail">Per benchmark</div>
                </div>
            `;
            resultsDiv.appendChild(metricsDiv);

            // Compilation time chart
            const timeChartDiv = document.createElement('div');
            timeChartDiv.className = 'chart-container';
            timeChartDiv.innerHTML = '<div class="chart-title">Compilation Time by Complexity</div>';

            const maxTime = Math.max(...results.map(r => r.max));
            const barChart = document.createElement('div');
            barChart.className = 'bar-chart';

            results.forEach(result => {
                const barItem = document.createElement('div');
                barItem.className = 'bar-item';

                const width = (result.avg / maxTime * 100).toFixed(2);

                barItem.innerHTML = `
                    <div class="bar-label">${result.name}</div>
                    <div class="bar-wrapper">
                        <div class="bar-fill" style="width: ${width}%">${result.avg.toFixed(2)}ms</div>
                    </div>
                `;
                barChart.appendChild(barItem);
            });

            timeChartDiv.appendChild(barChart);
            resultsDiv.appendChild(timeChartDiv);

            // Throughput chart
            const throughputChartDiv = document.createElement('div');
            throughputChartDiv.className = 'chart-container';
            throughputChartDiv.innerHTML = '<div class="chart-title">Throughput (LOC/second)</div>';

            const maxThroughput = Math.max(...results.map(r => parseInt(r.throughput)));
            const throughputChart = document.createElement('div');
            throughputChart.className = 'bar-chart';

            results.forEach(result => {
                const barItem = document.createElement('div');
                barItem.className = 'bar-item';

                const width = (parseInt(result.throughput) / maxThroughput * 100).toFixed(2);

                barItem.innerHTML = `
                    <div class="bar-label">${result.name}</div>
                    <div class="bar-wrapper">
                        <div class="bar-fill" style="width: ${width}%">${result.throughput} LOC/s</div>
                    </div>
                `;
                throughputChart.appendChild(barItem);
            });

            throughputChartDiv.appendChild(throughputChart);
            resultsDiv.appendChild(throughputChartDiv);

            // Detailed table
            const tableDiv = document.createElement('div');
            tableDiv.className = 'chart-container';
            tableDiv.innerHTML = '<div class="chart-title">Detailed Statistics</div>';

            const table = document.createElement('table');
            table.className = 'benchmark-table';
            table.innerHTML = `
                <thead>
                    <tr>
                        <th>Benchmark</th>
                        <th>LOC</th>
                        <th>Min (ms)</th>
                        <th>Avg (ms)</th>
                        <th>Max (ms)</th>
                        <th>Median (ms)</th>
                        <th>Bytecode (bytes)</th>
                        <th>Throughput</th>
                    </tr>
                </thead>
                <tbody>
                    ${results.map(r => `
                        <tr>
                            <td><strong>${r.name}</strong></td>
                            <td>${r.loc}</td>
                            <td>${r.min.toFixed(2)}</td>
                            <td><strong>${r.avg.toFixed(2)}</strong></td>
                            <td>${r.max.toFixed(2)}</td>
                            <td>${r.median.toFixed(2)}</td>
                            <td>${r.avgBytecode.toFixed(0)}</td>
                            <td><strong>${r.throughput} LOC/s</strong></td>
                        </tr>
                    `).join('')}
                </tbody>
            `;

            tableDiv.appendChild(table);
            resultsDiv.appendChild(tableDiv);

            console.log('Benchmarks complete:', results);
        }

        window.clearResults = function() {
            document.getElementById('results').innerHTML = '';
        };

        // Initialize on load
        window.addEventListener('load', initWasm);
    </script>
</body>
</html>
