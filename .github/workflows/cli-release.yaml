# This defines a workflow to build and release a new version of the aptos CLI.
# In order to trigger it go to the Actions Tab of the Repo, click "Release CLI" and then "Run Workflow".

name: "Release CLI"

on:
  workflow_dispatch:
    inputs:
      release_version:
        type: string
        required: true
        description: "The release version. E.g. `0.2.3`:"
      source_git_ref_override:
        type: string
        required: false
        description: "GIT_SHA_OVERRIDE: Use this to override the Git SHA1, branch name (e.g. devnet) or tag to build the binaries from. Defaults to the workflow Git REV, but can be different than that:"
      dry_run:
        type: boolean
        required: false
        default: true
        description: "Dry run - If checked, the release will not be created"
      skip_checks:
        type: boolean
        required: false
        default: false
        description: "Skip checks - If checked, the release will skip version checks"


jobs:
  # TODO: Deprecated, please use "Linux" instead as it's more straightforwardly named
  build-ubuntu22-binary:
    name: "Build Ubuntu 22.04 binary"
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_git_ref_override }}
      - uses: aptos-labs/aptos-core/.github/actions/cli-rust-setup@main
      - name: Build CLI
        run: scripts/cli/build_cli_release.sh "Ubuntu-22.04" "${{inputs.release_version}}" "${{inputs.skip_checks}}" "false"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-builds-ubuntu-22.04
          path: aptos-cli-*.zip

  # Add one for 24.04 to be clear
  build-ubuntu24-binary:
    name: "Build Ubuntu 24.04 binary"
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_git_ref_override }}
      - uses: aptos-labs/aptos-core/.github/actions/cli-rust-setup@main
      - name: Build CLI
        run: scripts/cli/build_cli_release.sh "Ubuntu-24.04" "${{inputs.release_version}}" "${{inputs.skip_checks}}" "false"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-builds-ubuntu-24.04
          path: aptos-cli-*.zip

  # Portable fully-static Linux binary via musl (runs on any Linux distro)
  build-linux-binary:
    name: "Build Portable Linux binary"
    runs-on: ubuntu-22.04
    container:
      image: alpine:3.21
    steps:
      - name: Install build dependencies
        run: |
          apk add --no-cache \
            build-base coreutils pkgconfig openssl-dev openssl-libs-static \
            zlib-dev zlib-static \
            git lld elfutils-dev clang clang-dev llvm cmake libc-dev \
            curl bash zip perl linux-headers
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_git_ref_override }}
      - name: Install Rust
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          . "$HOME/.cargo/env"
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Build CLI
        run: scripts/cli/build_cli_release.sh "Linux" "${{inputs.release_version}}" "${{inputs.skip_checks}}" "portable"
      - name: Verify static binary
        run: |
          file target/x86_64-unknown-linux-musl/cli/aptos | tee /dev/stderr | grep -q "statically linked"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-builds-linux
          path: aptos-cli-*.zip

  # Portable fully-static Linux ARM binary via musl.
  # Unlike the x64 job, we cannot use `container:` here because GitHub Actions
  # JavaScript actions (checkout, upload-artifact) do not work inside Alpine
  # containers on ARM runners. Instead, checkout/upload run on the Ubuntu host
  # and the build runs inside Alpine via `docker run`.
  build-linux-arm-binary:
    name: "Build Portable Linux ARM binary"
    runs-on: ubuntu-22.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_git_ref_override }}
      - name: Build in Alpine container
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
          SKIP_CHECKS: ${{ inputs.skip_checks }}
        run: |
          docker run --rm \
            -e RELEASE_VERSION -e SKIP_CHECKS \
            -v "$GITHUB_WORKSPACE:/work" -w /work \
            alpine:3.21 sh -c '
              apk add --no-cache \
                build-base coreutils pkgconfig openssl-dev openssl-libs-static \
                zlib-dev zlib-static \
                git lld elfutils-dev clang clang-dev llvm cmake libc-dev \
                curl bash zip perl linux-headers &&
              git config --global --add safe.directory /work &&
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y &&
              . "$HOME/.cargo/env" &&
              bash scripts/cli/build_cli_release.sh "Linux" "$RELEASE_VERSION" "$SKIP_CHECKS" "portable"
            '
      - name: Verify static binary
        run: |
          file target/aarch64-unknown-linux-musl/cli/aptos | tee /dev/stderr | grep -q "statically linked"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-builds-linux-arm
          path: aptos-cli-*.zip

  build-macos-x86_64-binary:
    name: "Build MacOS x86_64 binary"
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_git_ref_override }}
      - uses: aptos-labs/aptos-core/.github/actions/cli-rust-setup@main
      - name: Build CLI
        run: scripts/cli/build_cli_release.sh "macOS" "${{inputs.release_version}}" "${{inputs.skip_checks}}" "false"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-builds-macos-x86-64
          path: aptos-cli-*.zip

  build-macos-arm-binary:
    name: "Build MacOS ARM binary"
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_git_ref_override }}
      - uses: aptos-labs/aptos-core/.github/actions/cli-rust-setup@main
      - name: Build CLI
        run: scripts/cli/build_cli_release.sh "macOS" "${{inputs.release_version}}" "${{inputs.skip_checks}}" "false"
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-builds-macos-arm
          path: aptos-cli-*.zip

  build-windows-binary:
    name: "Build Windows binary"
    runs-on: windows-2025
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.source_git_ref_override }}
      # Ensure that long paths work
      - name: Ensure long paths work
        run: git config --global core.longpaths true
        shell: bash
      - name: Build CLI
        run: scripts\cli\build_cli_release.ps1
      - name: Upload Binary
        uses: actions/upload-artifact@v4
        with:
          name: cli-builds-windows
          path: aptos-cli-*.zip

  release-binaries:
    name: "Release binaries"
    needs:
      - build-ubuntu22-binary
      - build-ubuntu24-binary
      - build-windows-binary
      - build-linux-binary
      - build-linux-arm-binary
      - build-macos-arm-binary
      - build-macos-x86_64-binary
    runs-on: 2cpu-gh-ubuntu24-x64
    permissions:
      contents: "write"
      pull-requests: "read"
    if: ${{ inputs.dry_run }} == 'false'
    steps:
      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          pattern: cli-builds-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: marvinpinto/action-automatic-releases@919008cf3f741b179569b7a6fb4d8860689ab7f0 # pin@v1.2.1
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: "${{ format('aptos-cli-v{0}', inputs.release_version) }}"
          prerelease: false
          title: "${{ format('Aptos CLI Release v{0}', inputs.release_version) }}"
          files: |
            aptos-cli-*.zip

  bump-homebrew-version-pr:
    name: "Make PR to bump version in Homebrew"
    needs:
      - release-binaries
    runs-on: 2cpu-gh-ubuntu24-x64
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: aptos
          tag-name: "${{ format('aptos-cli-v{0}', inputs.release_version) }}"
          base-branch: main
          create-pullrequest: true
          commit-message: |
            {{formulaName}} {{version}}

            Created by https://github.com/mislav/bump-homebrew-formula-action

            From CLI release run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          COMMITTER_TOKEN: ${{ secrets.APTOS_BOT_GH_PAT_APTOS_CORE_HOMEBREW_BUMPER }}
