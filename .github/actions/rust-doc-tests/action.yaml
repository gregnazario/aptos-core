name: Rust Doc Tests
description: Runs only the rust doc tests
inputs:
  GIT_CREDENTIALS:
    description: "Optional credentials to pass to git. Useful if you need to pull private repos for dependencies"
    required: false

runs:
  using: composite
  steps:
    # The source code must be checked out by the workflow that invokes this action.

    # Cache cargo registry and build artifacts
    - name: Run cargo cache
      uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # pin@v2.7.8
      with:
        key: rust-doc-tests

    # Run the rust doc tests
    - name: Run rust doc tests
      run: cargo test --profile ci --locked --doc --workspace
      shell: bash
