name: "Rust Setup"
description: "Setup the rust toolchain and cache"
inputs:
  GIT_CREDENTIALS:
    description: "Optional credentials to pass to git"
    required: false
  ADDITIONAL_KEY:
    description: "An optional additional key to pass to rust-cache"
    required: false
    default: ""
  macos:
    description: "If the machine is using macOS"
    required: false
    default: false
  sccache-cache-rust:
    description: "Whether to wrap rustc with sccache (set false for coverage builds using cargo-llvm-cov)"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - if: ${{inputs.macos != 'true'}}
      name: Linux - Setup dependencies
      run: sudo apt-get update && sudo apt-get install build-essential ca-certificates clang curl git libpq-dev libssl-dev pkg-config lsof lld --no-install-recommends --assume-yes
      shell: bash

    - uses: dsherret/rust-toolchain-file@v1

    # rust-cache caches ~/.cargo registry (sccache handles compilation artifacts)
    # https://github.com/Swatinem/rust-cache#cache-details
    - name: Run cargo cache
      uses: Swatinem/rust-cache@9d47c6ad4b02e050fd481d890b2ea34778fd09d6 # pin@v2.7.8
      with:
        shared-key: aptos-registry
        cache-targets: "false"
        cache-all-crates: "true"

    - name: Install sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    - name: Configure AWS credentials for sccache
      continue-on-error: true
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: arn:aws:iam::323143817725:role/sccache
        aws-region: us-west-2

    # S3 sccache config — keep in sync with:
    #   .github/actions/sccache-setup/action.yaml
    #   .github/actions/cli-rust-setup/action.yaml
    - name: Configure sccache environment
      shell: bash
      run: |
        # Only enable S3 backend when AWS credentials are available;
        # without creds sccache falls back to local-only caching.
        if [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
          echo "SCCACHE_BUCKET=aptos-shared-sccache" >> $GITHUB_ENV
          echo "SCCACHE_REGION=us-west-2" >> $GITHUB_ENV
          echo "SCCACHE_S3_USE_SSL=true" >> $GITHUB_ENV
        fi
        # Normalize checkout path so cache keys are path-independent
        echo "SCCACHE_BASEDIRS=$GITHUB_WORKSPACE" >> $GITHUB_ENV
        echo "CC_x86_64_unknown_linux_gnu=sccache clang" >> $GITHUB_ENV
        echo "CXX_x86_64_unknown_linux_gnu=sccache clang++" >> $GITHUB_ENV

    - name: Configure sccache as rustc wrapper
      if: inputs.sccache-cache-rust == 'true'
      shell: bash
      run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

    - name: Show sccache config
      shell: bash
      run: sccache --show-stats

    - if: ${{inputs.macos != 'true'}}
      name: Linux - install protoc and related tools
      shell: bash
      run: scripts/dev_setup.sh -b -r -y -P -J -t

    - if: ${{inputs.macos == 'true'}}
      name: Mac - install protoc and related tools
      shell: bash
      run: scripts/dev_setup.sh -b -t -k

    - run: echo "/home/runner/.cargo/bin" | tee -a $GITHUB_PATH
      shell: bash

    - name: Setup git credentials
      if: inputs.GIT_CREDENTIALS != ''
      shell: bash
      run: |
        git config --global credential.helper store
        echo "${{ inputs.GIT_CREDENTIALS }}" > ~/.git-credentials

    # Display the rust toolchain version being installed
    - name: Setup rust toolchain
      shell: bash
      run: rustup show
