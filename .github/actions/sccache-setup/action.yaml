name: "sccache Setup"
description: "Install and configure sccache for CI builds"
inputs:
  cache-rust:
    description: "Whether to wrap rustc with sccache (set false for coverage builds using cargo-llvm-cov)"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Install sccache
      uses: mozilla-actions/sccache-action@v0.0.9

    # S3 sccache config — keep in sync with:
    #   .github/actions/rust-setup/action.yaml
    #   .github/actions/cli-rust-setup/action.yaml
    - name: Configure sccache environment
      shell: bash
      run: |
        # Only enable S3 backend when AWS credentials are available;
        # without creds sccache falls back to local-only caching.
        if [ -n "${AWS_ACCESS_KEY_ID:-}" ]; then
          echo "SCCACHE_BUCKET=aptos-shared-sccache" >> $GITHUB_ENV
          echo "SCCACHE_REGION=us-west-2" >> $GITHUB_ENV
          echo "SCCACHE_S3_USE_SSL=true" >> $GITHUB_ENV
        fi
        # Normalize checkout path so cache keys are path-independent
        echo "SCCACHE_BASEDIRS=$GITHUB_WORKSPACE" >> $GITHUB_ENV
        # Wrap C/C++ compilers for -sys crate caching (~95s savings)
        echo "CC_x86_64_unknown_linux_gnu=sccache clang" >> $GITHUB_ENV
        echo "CXX_x86_64_unknown_linux_gnu=sccache clang++" >> $GITHUB_ENV

    - name: Configure sccache as rustc wrapper
      if: inputs.cache-rust == 'true'
      shell: bash
      run: echo "RUSTC_WRAPPER=sccache" >> $GITHUB_ENV

    - name: Show sccache config
      shell: bash
      run: sccache --show-stats
