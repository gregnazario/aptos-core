# Patched vendored copy of ledger-transport-hid 0.10.0 (upstream: Zondax/ledger-rs)
#
# The ONLY change from upstream is switching the hidapi backend from
# "linux-static-hidraw" (requires libudev) to "linux-static-libusb"
# (requires libusb-1.0). This allows cross-compiling for musl targets
# where libudev is not available.
#
# See: https://github.com/libusb/hidapi#linux
[package]
name = "ledger-transport-hid"
description = "Ledger Hardware Wallet - HID Transport"
version = "0.10.0"
license = "Apache-2.0"
authors = ["Zondax AG <hello@zondax.ch>"]
homepage = "https://github.com/zondax/ledger-rs"
repository = "https://github.com/zondax/ledger-rs"
readme = "README.md"
categories  = ["authentication", "cryptography"]
keywords = ["ledger", "nano", "blue", "apdu"]
edition = "2021"

[dependencies]
libc = "0.2"
byteorder = "1.4"
cfg-if = "1.0.0"
thiserror = "1.0"
hex = "0.4"
log = "0.4"

ledger-transport = "0.10"

# PATCHED: use libusb backend instead of hidraw to avoid libudev dependency.
# Upstream uses: hidapi = { version = "1.4.1", features = ["linux-static-hidraw"], default-features = false }
hidapi = { version = "1.4.1", features = ["linux-static-libusb"], default-features = false }
